<!DOCTYPE html>
<html>
<head>
    <title>Demo - OSD Annotation</title>
    <script type="text/javascript" src="./openseadragon/openseadragon.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.js"></script>
    <script type="module" src="./demo.mjs"></script>
    <link rel="stylesheet" href="./demo.css">
</head>
<body>
    <div class="content">
        <div class="demo">
            <h3>Basic viewer</h3>
            <div id="basic-viewer" class="viewer"></div>
            <div id="demo-event-log-section" class="demo-section" style="margin-top: 1em;">
                <div class="btn-group btn-group-sm" style="margin-bottom: 0.5em;">
                    <button type="button" id="demo-event-log-toggle" class="btn btn-sm">Start event log</button>
                    <button type="button" id="demo-event-log-clear" class="btn btn-sm">Clear log</button>
                </div>
                <div id="demo-event-log" class="event-log" aria-live="polite"></div>
            </div>
        </div>
        <div class="demo hidden">
            <h3>Cathedral viewer</h3>
            <div>Demonstrates a viewer with annotation tools initially hidden</div>
            <div id="demo-viewer" class="viewer"></div>
        </div>
        <div class="demo">
            <h3>Local image viewer - try me</h3>
            <div>Use the annotation tools with local images</div>
            <div><input type='file' accept="image/*"></div>
            <div id="local-viewer" class="viewer"></div>
        </div>
    </div>
</body>
</html>
