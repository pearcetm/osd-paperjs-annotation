<!DOCTYPE html>
<html>
<head>
    <title>Ruler tool – development</title>
    <script type="text/javascript" src="./openseadragon/openseadragon.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.js"></script>
    <script type="module" src="./ruler.mjs"></script>
    <link rel="stylesheet" href="./demo.css">
</head>
<body>
    <div class="content">
        <div class="demo">
            <h3>Ruler tool – development</h3>
            <div class="demo-section">
                <h4>Headless (programmatic) – 0.25 µm/px</h4>
                <div id="ruler-headless-controls" class="headless-controls" aria-label="Headless tool controls">
                    <div class="headless-tool-buttons btn-group btn-group-sm"></div>
                    <div id="ruler-headless-tool-outlet" class="headless-tool-outlet"></div>
                </div>
                <div id="ruler-viewer-headless" class="viewer"></div>
            </div>
        </div>
    </div>
</body>
</html>
